<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Comment Heart Helper</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="댓글 불러오기 설정">
        <div class="headingBlock">
          <p class="eyebrow">YouTube Studio Helper</p>
          <h1>댓글 하트 후보</h1>
          <p class="summary">채널 댓글을 모아 확인하고, 필요한 답글은 바로 작성합니다.</p>
        </div>

        <form id="settingsForm" class="settings">
          <label>
            <span>연결 키</span>
            <input id="apiKey" type="password" autocomplete="off" placeholder="AIza..." />
          </label>
          <label>
            <span>영상 범위</span>
            <select id="videoScope">
              <option value="all" selected>전체</option>
              <option value="10">최근 10개</option>
              <option value="50">최근 50개</option>
            </select>
          </label>
          <div class="formActions">
            <button type="button" id="authButton">Google 연결</button>
            <button type="submit" id="loadButton">댓글 불러오기</button>
          </div>
          <details class="advancedSettings">
            <summary>고급 설정</summary>
            <div class="advancedGrid">
              <label>
                <span>OAuth 클라이언트 ID</span>
                <input
                  id="clientId"
                  type="text"
                  value="550773902598-ted9eeglebq3jo5ju7t61rh3gh5bakim.apps.googleusercontent.com"
                />
              </label>
              <label>
                <span>채널 ID</span>
                <input id="channelId" type="text" value="UCFCMjPa9xYNKkGQLHAQRTuw" />
              </label>
            </div>
          </details>
        </form>
      </section>

      <section class="statusRow" aria-live="polite">
        <div>
          <strong id="statusTitle">준비됨</strong>
          <span id="statusDetail">API 키를 넣고 댓글을 가져오세요. 답글은 Google 연결 후 작성할 수 있습니다.</span>
        </div>
        <button id="clearButton" type="button">저장값 지우기</button>
      </section>

      <section class="filters" aria-label="댓글 필터">
        <button class="filterButton active" type="button" data-filter="all">전체</button>
        <button class="filterButton" type="button" data-filter="unreplied">답글 없음</button>
        <button class="filterButton" type="button" data-filter="liked">좋아요 있음</button>
      </section>

      <section class="aiPanel" aria-label="AI 답글 프롬프트">
        <div>
          <h2>AI 답글 초안</h2>
          <p>현재 댓글 목록에서 답글 후보만 모아 외부 AI에 붙여넣을 프롬프트를 복사합니다.</p>
        </div>
        <section class="listEditor" data-list="guidelines" aria-label="병원 답변 방향">
          <header>
            <h3>병원 답변 방향</h3>
            <div class="iconActions">
              <button type="button" class="iconButton" data-action="download" title="txt 내려받기">
                <i data-lucide="download"></i>
              </button>
              <button type="button" class="iconButton" data-action="trigger-import" title="txt 불러오기">
                <i data-lucide="upload"></i>
              </button>
              <input class="importFile" type="file" accept=".txt,text/plain" hidden />
            </div>
          </header>
          <div class="ruleList"></div>
          <div class="newRuleRow">
            <input class="newRuleInput" type="text" placeholder="답변 방향 추가" />
            <button type="button" class="iconButton addButton" data-action="add" title="추가">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </section>
        <section class="listEditor" data-list="strengths" aria-label="직원 추가 특장점">
          <header>
            <h3>직원 추가 특장점</h3>
            <div class="iconActions">
              <button type="button" class="iconButton" data-action="download" title="txt 내려받기">
                <i data-lucide="download"></i>
              </button>
              <button type="button" class="iconButton" data-action="trigger-import" title="txt 불러오기">
                <i data-lucide="upload"></i>
              </button>
              <input class="importFile" type="file" accept=".txt,text/plain" hidden />
            </div>
          </header>
          <div class="ruleList"></div>
          <div class="newRuleRow">
            <input class="newRuleInput" type="text" placeholder="특장점 추가" />
            <button type="button" class="iconButton addButton" data-action="add" title="추가">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </section>
        <button type="button" id="copyPromptButton">프롬프트 복사</button>
      </section>

      <section id="results" class="results" aria-label="댓글 목록"></section>
    </main>

    <template id="commentTemplate">
      <article class="commentCard">
        <header>
          <img class="avatar" alt="" />
          <div>
            <h2 class="author"></h2>
            <p class="meta"></p>
          </div>
        </header>
        <p class="commentText"></p>
        <div class="existingReplies"></div>
        <form class="replyForm">
          <textarea class="replyText" rows="2" placeholder="답글 작성"></textarea>
          <button class="replyButton" type="submit">답글 달기</button>
        </form>
        <footer>
          <span class="likeBadge"></span>
          <div class="actions">
            <a class="watchLink" target="_blank" rel="noreferrer">영상</a>
            <a class="studioLink" target="_blank" rel="noreferrer">Studio</a>
          </div>
        </footer>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
